<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>فریلنس پلاس</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        margin: 0;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <style id="app-splash-styles">
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #0b1f4a 0%, #1e3a8a 50%, #172554 100%);
        overflow: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-splash.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash::before,
      #app-splash::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        animation: splash-float 7s ease-in-out infinite alternate;
      }
      #app-splash::before {
        width: 320px;
        height: 320px;
        top: 10%;
        right: 15%;
        background: rgba(59, 130, 246, 0.35);
      }
      #app-splash::after {
        width: 260px;
        height: 260px;
        bottom: 12%;
        left: 10%;
        background: rgba(14, 165, 233, 0.28);
        animation-delay: -3s;
      }
      @keyframes splash-float {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(-20px, 18px) scale(1.08); }
      }
      #app-splash .logo {
        width: 96px;
        height: 96px;
        border-radius: 28px;
        background: #1e3a8a;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 40px rgba(30, 58, 138, 0.45);
        animation: splash-logo-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                   splash-pulse 2.4s ease-in-out 0.7s infinite;
        opacity: 0;
        transform: scale(0.6);
        z-index: 1;
      }
      #app-splash .logo img {
        width: 68px;
        height: 68px;
        object-fit: contain;
      }
      @keyframes splash-logo-in {
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      #app-splash .title {
        margin-top: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #fff;
        z-index: 1;
        animation: splash-text-in 0.5s ease 0.25s forwards;
        opacity: 0;
        transform: translateY(12px);
      }
      #app-splash .subtitle {
        margin-top: 6px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        z-index: 1;
        animation: splash-text-in 0.5s ease 0.35s forwards;
        opacity: 0;
        transform: translateY(12px);
      }
      @keyframes splash-text-in {
        to { opacity: 1; transform: translateY(0); }
      }
      #app-splash .dots {
        display: flex;
        gap: 8px;
        margin-top: 36px;
        z-index: 1;
      }
      #app-splash .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fff;
        animation: splash-dot 1.4s ease-in-out infinite;
      }
      #app-splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #app-splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <noscript>برای استفاده از فریلنس پلاس، JavaScript را فعال کنید.</noscript>
    <div id="app-splash">
      <div class="logo">
        <img src="/assets/splash-icon.png" alt="فریلنس پلاس" />
      </div>
      <div class="title">فریلنس پلاس</div>
      <div class="subtitle">مدیریت مالی فریلنسرها</div>
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
